name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: Run tests
        run: python -m pytest -q
      - name: Check dashboard readiness
        run: python scripts/check_dashboard_readiness.py
      - name: Regenerate consolidated results
        run: python scripts/build_comparison_report.py
      - name: Verify generated results are current
        run: git diff --exit-code -- data/results/comparison_metrics.csv data/results/comparison_report.md
